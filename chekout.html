<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - HarvestHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="chekout.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1 class="text-center">Checkout</h1>
    </header>

    <main class="container my-5">
        <!-- Billing Details Form -->
        <section>
            <h2>Billing Details</h2>
            <form id="checkout-form" action="process_payment.php" method="POST">
                <div class="mb-3">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="fullName" name="fullName" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="address" class="form-label">Address</label>
                    <input type="text" class="form-control" id="address" name="address" required>
                </div>
                <div class="mb-3">
                    <label for="city" class="form-label">City</label>
                    <input type="text" class="form-control" id="city" name="city" required>
                </div>
                <div class="mb-3">
                    <label for="zipCode" class="form-label">Zip Code</label>
                    <input type="text" class="form-control" id="zipCode" name="zipCode" required>
                </div>
            </form>
        </section>

        <!-- Order Summary -->
        <section class="mt-5">
            <h2>Order Summary</h2>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="order-summary">
                    <!-- Dynamic content will be loaded here -->
                </tbody>
            </table>
            <h3 id="order-total" class="text-end">Total: $0.00</h3>
        </section>

        <!-- Payment Section -->
        <section class="mt-5">
            <h2>Payment</h2>
            <div class="mb-3">
                <label for="cardNumber" class="form-label">Card Number</label>
                <input type="text" class="form-control" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="expiryDate" class="form-label">Expiry Date</label>
                    <input type="text" class="form-control" id="expiryDate" name="expiryDate" placeholder="MM/YY" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="cvv" class="form-label">CVV</label>
                    <input type="text" class="form-control" id="cvv" name="cvv" placeholder="123" required>
                </div>
            </div>
        </section>

        <!-- Confirm Button -->
        <div class="text-end mt-4">
            <button type="submit" form="checkout-form" class="btn btn-primary btn-lg">Confirm Payment</button>
        </div>
    </main>

    <footer class="text-center mt-5">
        <p>© 2024 HarvestHub. All rights reserved.</p>
    </footer>

    <script>
        // Example cart data (replace with actual data in integration)
        const cartItems = [
            { name: "Fresh Apples", quantity: 2, price: 1.5 },
            { name: "Organic Carrots", quantity: 3, price: 0.75 },
        ];

        const orderSummary = document.getElementById("order-summary");
        const orderTotal = document.getElementById("order-total");

        function loadOrderSummary() {
            let total = 0;
            orderSummary.innerHTML = "";

            cartItems.forEach(item => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${item.name}</td>
                    <td>${item.quantity}</td>
                    <td>$${item.price.toFixed(2)}</td>
                    <td>$${(item.quantity * item.price).toFixed(2)}</td>
                `;
                orderSummary.appendChild(row);
                total += item.quantity * item.price;
            });

            orderTotal.textContent = `Total: $${total.toFixed(2)}`;
        }

        // Initialize order summary
        loadOrderSummary();
    </script>
</body>
</html>
