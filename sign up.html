<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital@1&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <title>Sign Up | HarvestHub</title>
    <link rel="stylesheet" href="sign up style.css"> 
</head>
<body>
    <!-- Header Section -->
    <header>
        <div class="logo">
            <h1>HarvestHub</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="aboutus.html">About Us</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                
            </ul>
        </nav>
    </header>

    <div class="sign-up-container">
        <h2>Create Your Account</h2>
        <form action="#" method="POST" class="sign-up-form">
            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirm Password:</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
            </div>

            <!-- Checkbox for Terms and Conditions -->
            <div class="form-group checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the <a href="terms.html">Terms and Conditions</a></label>
            </div>

            <button type="submit" class="sign-up-btn">Sign Up</button>
            <p>Already have an account? <a href="Sign In.html">Sign In here</a></p>
        </form>
    </div>
    <!--footer-->

    <section class="footer" id="footerid">
   
        <!--devo-->
    
        <hr class="w-50 mt-5 mx-auto text-dark">
        <div class="container last-footer" >
            <div class="row">
                <div class="col-lg-4 col-md-4 col-12 mx-auto Copyright">
                    <h4 id="last-logo">HarvestHub</h4> 
                </div>
                <div class="col-lg-4 col-md-4 col-12 mx-auto Copyright">
                    <h4><span id="Name">HarvestHub</span> © Privacy Policy</h4>
                </div>
                <div class="col-lg-4 col-md-4 col-12 mx-auto Copyright">
                    <h4>Developed by <span id="Name">Group 8.</span></h3>
                </div>
            </div>
        </div>
    </section>

    

</body>
</html>
